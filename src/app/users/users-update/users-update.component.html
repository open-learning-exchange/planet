<mat-toolbar>
  <button mat-icon-button (click)="goBack()" *ngIf="!submissionMode">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <ng-container [ngSwitch]="submissionMode">
    <span *ngSwitchCase="true" i18n>Survey Profile</span>
    <span *ngSwitchCase="false" i18n>Edit Member Profile</span>
  </ng-container>
</mat-toolbar>

<div class="space-container">
  <mat-toolbar class="primary-color font-size-1">
    <span>{{user.name}}</span>
    <span *ngIf="submissionMode" i18n>{{title}}</span>
  </mat-toolbar>
  <div class="view-container">
    <div class="form-container">
      <form [formGroup]="editForm" class="form-space" (ngSubmit)="onSubmit()">
        <planet-users-profile-form [form]="editForm" [submissionMode]="submissionMode"></planet-users-profile-form>
        <div class="action-buttons">
          <button type="submit" mat-raised-button [planetSubmit]="editForm.valid" color="primary" i18n>Update</button>
          <button type="button" mat-raised-button color="warn" (click)="goBack()" i18n>Cancel</button>
        </div>
      </form>
    </div>
    <div *ngIf="!submissionMode">
      <div style="text-align: center;">
        <img *ngIf="showImagePreview" class="profile-image-update" [src]="previewSrc"><br>
        <div class="action-buttons">
          <button mat-raised-button color="secondary" (click)="fileInput.click()"><span i18n>Choose Image</span></button>
          <button *ngIf="imageChangedEvent || attachmentDeleted" mat-raised-button color="accent" (click)="resetSelection()"><span i18n>Reset Selection</span></button>
          <button *ngIf="uploadImage && currentImgKey && !imageChangedEvent && !attachmentDeleted" mat-raised-button color="accent" (click)="deleteImageAttachment()"><span i18n>Remove</span></button>
        </div>
        <input #fileInput id="fileInput" type="file" accept="image/*" (change)="openImageEditDialog($event)" style="display: none;" />
      </div>
    </div>
  </div>
</div>
<ng-template #imageEditDialog>
  <mat-dialog-content class="profile-image-section">
    <img class="profile-image-update" [src]="previewSrc"/>
    <div class="profile-image-upload">
      <image-cropper [imageChangedEvent]="imageChangedEvent" format="webp" output="base64" (imageCropped)="onImageSelect($event)"></image-cropper>
    </div>
  </mat-dialog-content>
  <mat-dialog-actions>
    <button mat-button mat-dialog-close (click)="resetSelection()" i18n>Cancel</button>
    <button mat-button mat-dialog-close i18n>Confirm</button>
  </mat-dialog-actions>
</ng-template>
