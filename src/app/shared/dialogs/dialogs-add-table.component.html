<mat-dialog-content>
  @switch (mode) {
    @case ('courses') {
      <planet-courses [isDialog]="true" [excludeIds]="data.excludeIds"></planet-courses>
    }
    @case ('users') {
      <planet-users [isDialog]="true" [hideChildren]="data.hideChildren" [excludeIds]="data.excludeIds"></planet-users>
    }
    @case ('teams') {
      <div>
        <mat-form-field class="full-width">
          <mat-label i18n>Send to team or enterprise</mat-label>
          <mat-select (selectionChange)="onSelectionChange($event)">
            @for (link of links; track link) {
              <mat-option [value]="link">{{link.title}}</mat-option>
            }
          </mat-select>
        </mat-form-field>
        @if (selectedLink) {
          <planet-teams
            [isDialog]="true"
            [excludeIds]="data.excludeIds"
            [mode]="selectedLink?.selector?.type"
            (rowClick)="teamSelect($event)"
          ></planet-teams>
        }
      </div>
    }
  }
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-raised-button mat-dialog-close i18n>Cancel</button>
  <button color="primary" mat-raised-button [disabled]="okDisabled" (click)="ok()" i18n>OK</button>
</mat-dialog-actions>
