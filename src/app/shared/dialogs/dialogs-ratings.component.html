<h2 mat-dialog-title><ng-container i18n>Ratings for</ng-container><i> {{title}}</i></h2>
<mat-dialog-content>
  <div class="display-flex">
    <span class="toolbar-fill"></span>
    <mat-form-field class="font-size-1 margin-lr-5">
      <mat-label i18n>Sort by</mat-label>
      <mat-select (selectionChange)="onSortChange($event.value)">
        <mat-option i18n value="time,1">Most Recent</mat-option>
        <mat-option i18n value="time,-1">Oldest</mat-option>
        <mat-option i18n value="rate,1">Best Rating</mat-option>
        <mat-option i18n value="rate,-1">Worst Rating</mat-option>
      </mat-select>
    </mat-form-field>
  </div>
  @for (rating of ratings; track rating) {
    <mat-card class="margin-tb">
      <mat-card-header>
        <mat-card-title>
          <planet-rating-stars [value]="rating.rate" [disabled]="true"></planet-rating-stars>
          @if (rating.time) {
            <div class="mat-caption">{{rating.time | date:'longDate'}}</div>
          }
        </mat-card-title>
      </mat-card-header>
      @if (rating.comment) {
        <mat-card-content>{{rating.comment}}</mat-card-content>
      }
    </mat-card>
  }
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-raised-button color="primary" mat-dialog-close i18n>OK</button>
</mat-dialog-actions>
