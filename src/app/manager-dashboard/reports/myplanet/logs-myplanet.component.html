<planet-myplanet-toolbar i18n-title title="myPlanet Logs"
  [types]="types"
  [showTypeFilter]="true"
  [versions]="versions"
  [selectedVersion]="selectedVersion"
  [selectedType]="selectedType"
  [timeFilterOptions]="timeFilterOptions"
  [selectedTimeFilter]="selectedTimeFilter"
  [formGroup]="filtersForm"
  [showCustomDateFields]="showCustomDateFields"
  [minDate]="minDate"
  [today]="today"
  [searchValue]="searchValue"
  [disableShowAllTime]="isDefaultTimeFilter"
  (typeChange)="onTypeChange($event)"
  (versionChange)="onVersionChange($event)"
  (timeFilterChange)="onTimeFilterChange($event)"
  (searchChange)="filterData($event)"
  (clear)="clearFilters()"
  (resetDateFilter)="resetDateFilter()"
></planet-myplanet-toolbar>
<div class="space-container">
  <mat-toolbar>
    <mat-toolbar-row class="primary-color font-size-1">
      <span i18n>myPlanet</span>
      <span class="toolbar-fill"></span>
      @if (!isEmpty) {
        <button mat-raised-button color="accent" (click)="exportAll()">
          <span i18n>Export All</span>
        </button>
      }
    </mat-toolbar-row>
  </mat-toolbar>
  <div class="view-container view-full-height">
    @for (planet of apklogs; track planet) {
      @if (planet.children.length) {
        <mat-expansion-panel>
          <mat-expansion-panel-header>
            <mat-panel-title>{{planet.nameDoc?.name || planet.doc?.name}} ({{planet.children.length}})</mat-panel-title>
          </mat-expansion-panel-header>
          <div class="responsive-table">
            <planet-myplanet-table dataType="logs" [data]="planet.children"></planet-myplanet-table>
          </div>
          @if (!isEmpty) {
            <button mat-raised-button color="accent" (click)="exportSingle(planet)" style="margin-right: 2rem;">
              <span i18n>Export</span>
            </button>
          }
        </mat-expansion-panel>
      }
    }
    @if (isLoading) {
      <planet-loading-spinner text="Loading logs..." i18n-text></planet-loading-spinner>
    }
    @if (!isLoading && isEmpty) {
      <mat-panel-title i18n>No record was found</mat-panel-title>
    }
  </div>
</div>
