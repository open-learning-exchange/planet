<form (ngSubmit)="onSubmit()" class="login-form" [formGroup]="userForm">
  <mat-form-field class="full-width">
    <mat-label i18n>Username</mat-label>
    <input matInput name="name" formControlName = "name" planetLowercase planetRestrictDiacritics autofocus required/>
    <mat-error>
      <planet-form-error-messages [control]="userForm.controls.name"></planet-form-error-messages>
    </mat-error>
  </mat-form-field>
  <mat-form-field class="full-width">
    <mat-label i18n>Password</mat-label>
    <input matInput name="password" [type]="showPassword ? 'text' : 'password'" formControlName = "password" required/>
    <button type="button" mat-icon-button matIconSuffix (click)="showPassword = !showPassword" tabindex="-1">
      <mat-icon>{{showPassword ? 'visibility' : 'visibility_off'}}</mat-icon>
    </button>
    <mat-error>
      <planet-form-error-messages [control]="userForm.controls.password"></planet-form-error-messages>
    </mat-error>
  </mat-form-field>
  @if (createMode) {
    <mat-form-field class="full-width">
      <mat-label i18n>Repeat Password</mat-label>
      <input matInput name="repeatPassword" [type]="showRepeatPassword ? 'text' : 'password'"  formControlName = "repeatPassword" />
      <button type="button" mat-icon-button matIconSuffix (click)="showRepeatPassword = !showRepeatPassword" tabindex="-1">
        <mat-icon>{{showRepeatPassword ? 'visibility' : 'visibility_off'}}</mat-icon>
      </button>
      <mat-error>
        <planet-form-error-messages [control]="userForm.controls.repeatPassword"></planet-form-error-messages>
      </mat-error>
    </mat-form-field>
  }
  <button mat-raised-button color="primary" [planetSubmit]="userForm.valid">
    @if (createMode) {
      <ng-container i18n>Become a member</ng-container>
    } @else {
      <ng-container i18n>SIGN-IN</ng-container>
    }
  </button>
  <a class="addUser cursor-pointer" (click)="toggleMode()">
    @if (createMode) {
      <ng-container i18n>Already have an account</ng-container>
    } @else {
      <ng-container i18n>Become a member</ng-container>
    }
  </a>
</form>
