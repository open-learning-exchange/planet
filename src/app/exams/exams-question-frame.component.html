<div [ngClass]="{ 'space-container': !isDialog }">
  <mat-toolbar class="primary-color font-size-1">
    @if (!isLoading) {
      <span>
        <span class="ellipsis-title">{{title ? title + ': ' : ''}}</span>
        <ng-container i18n>Question</ng-container>{{' ' + questionNum + ' '}}<ng-container i18n>of</ng-container>{{' ' + maxQuestions }}
        <ng-content select="[exam-frame-title-extra]"></ng-content>
      </span>
    }
    <span class="toolbar-fill"></span>
    <button mat-icon-button [disabled]="disablePrevious" (click)="previous.emit()"><mat-icon>navigate_before</mat-icon></button>
    <button mat-icon-button [disabled]="disableNext" (click)="next.emit()"><mat-icon>navigate_next</mat-icon></button>
  </mat-toolbar>
  @if (!isLoading && maxQuestions > 0) {
    <div class="progress-bar-track">
      <div class="progress-bar-fill" [style.width.%]="progressPercent"></div>
    </div>
  }
  <div #scrollContainer class="view-container" [ngClass]="{ 'view-full-height': !isDialog }">
    @if (!isLoading) {
      <div [ngClass]="slideClass">
        <ng-content></ng-content>
      </div>
    } @else {
      <planet-loading-spinner text="Loading content..." i18n-text></planet-loading-spinner>
    }
  </div>
</div>
