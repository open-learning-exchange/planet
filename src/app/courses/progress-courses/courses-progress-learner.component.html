<mat-toolbar>
  <a mat-icon-button (click)="navigateBack()"><mat-icon>arrow_back</mat-icon></a><span i18n>myProgress</span>
</mat-toolbar>

<div class="space-container">
  <mat-toolbar class="primary-color font-size-1">
    <span i18n>Courses: myProgress</span>
  </mat-toolbar>
  <div class="view-container view-full-height">
    @if (chartData?.length) {
      <planet-courses-progress-chart [inputs]="chartData" [height]="yAxisLength" [showTotals]="false" (clickAction)="handleCourseClick($event)" (changeData)="changeData($event)">
      </planet-courses-progress-chart>
    } @else {
      @if (isLoading) {
        <planet-loading-spinner text="Loading progress..." i18n-text></planet-loading-spinner>
      }
      @if (!isLoading) {
        <div class="view-container" i18n>
        No Progress record available
      </div>
      }
    }
  </div>
</div>
