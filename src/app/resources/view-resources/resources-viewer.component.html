<div [ngClass]="{'dialog-view':isDialog}">
  @switch (mediaType) {
    @case ('image') {
      <img [src]="resourceSrc" class="image-fit">
    }
    @case ('video') {
      <video controls [src]="resourceSrc" i18n>
    Browser not supported
  </video>
    }
    @case ('audio') {
      <audio controls [src]="resourceSrc" i18n>
    Browser not supported
  </audio>
    }
    @case ('pdf') {
      <div style="position: relative;">
        <div class="pdf-toolbar">
          <button mat-icon-button style="color: white" (click)="openFullscreen()">
            <mat-icon>fullscreen</mat-icon>
          </button>
        </div>
        <iframe #pdfViewer [src]="pdfSrc" width="100%" height="100%" allowfullscreen mozallowfullscreen webkitallowfullscreen
        oallowfullscreen msallowfullscreen></iframe>
      </div>
    }
    @case ('other') {
      <div><a mat-raised-button color="primary" i18n href={{resourceSrc}}>Download/Open</a></div>
    }
    @case ('HTML') {
      <iframe [src]="pdfSrc"></iframe>
    }
  }
</div>
